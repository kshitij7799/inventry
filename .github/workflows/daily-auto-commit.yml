name: Daily Auto Commit

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Run daily commit script
        run: node ./Downloads/lab-inventory-app/scripts/daily-commit.js

      - name: Commit and push daily update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Downloads/lab-inventory-app/daily-progress-log.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: daily auto-commit update"
            git push
          fi
